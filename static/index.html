<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 语音面试助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .container {
    max-width: 700px;
    width: 100%;
    padding: 24px;
    margin: 20px;
  }
  .card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 32px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  h1 {
    text-align: center;
    font-size: 1.8em;
    margin-bottom: 8px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.5);
    margin-bottom: 24px;
    font-size: 0.9em;
  }
  .form-group { margin-bottom: 16px; }
  label {
    display: block;
    margin-bottom: 6px;
    color: rgba(255,255,255,0.7);
    font-size: 0.9em;
  }
  select, input, textarea {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 1em;
    outline: none;
    transition: border 0.2s;
  }
  select:focus, input:focus { border-color: #f7971e; }
  select option { background: #302b63; color: #fff; }
  textarea { resize: vertical; min-height: 80px; }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    color: #1a1a2e;
    margin: 8px 0;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(247,151,30,0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.2);
    box-shadow: none;
  }
  .btn-danger {
    background: linear-gradient(90deg, #e74c3c, #c0392b);
    color: #fff;
  }

  .hidden { display: none !important; }

  .question-box {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 20px;
    margin: 16px 0;
    border-left: 4px solid #f7971e;
  }
  .question-label { font-size: 0.8em; color: rgba(255,255,255,0.4); }
  .question-text {
    font-size: 1.15em;
    line-height: 1.6;
    margin-top: 8px;
    color: #fff;
  }

  .recorder {
    text-align: center;
    padding: 16px;
  }
  .record-btn {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid #f7971e;
    background: rgba(247,151,30,0.1);
    cursor: pointer;
    transition: all 0.3s;
    margin: 12px auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .record-btn.recording {
    border-color: #e74c3c;
    background: rgba(231,76,60,0.2);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
    70% { box-shadow: 0 0 0 20px rgba(231,76,60,0); }
    100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
  }
  .record-icon {
    width: 32px; height: 32px;
    background: #f7971e;
    border-radius: 4px;
    transition: all 0.3s;
  }
  .recording .record-icon {
    background: #e74c3c;
    border-radius: 50%;
    width: 24px; height: 24px;
  }
  .timer { font-size: 1.2em; font-variant-numeric: tabular-nums; }
  .status-text { color: rgba(255,255,255,0.5); font-size: 0.85em; margin-top: 8px; }

  .step { display: none; }
  .step.active { display: block; }

  .progress {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin: 16px 0;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
  }
  .dot.done { background: #27ae60; }
  .dot.current { background: #f7971e; box-shadow: 0 0 8px rgba(247,151,30,0.5); }

  .history-item {
    background: rgba(255,255,255,0.04);
    border-radius: 12px;
    padding: 16px;
    margin: 12px 0;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .history-q { color: rgba(255,255,255,0.7); margin-bottom: 6px; }
  .history-a { color: #2ecc71; font-size: 0.9em; }
  .history-audio { margin-top: 8px; }
  .history-audio audio { width: 100%; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 0.9em;
    z-index: 999;
    display: none;
    backdrop-filter: blur(8px);
  }
  .toast.show { display: block; }

  @media (max-width: 500px) {
    .container { padding: 12px; }
    .card { padding: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>&#127908; AI 语音面试</h1>
    <p class="subtitle">Cloudflare Workers &#183; 纯语音回答 &#183; 录音云端保存</p>

    <!-- Step 1: Setup -->
    <div id="step-setup" class="step active">
      <div class="form-group">
        <label>面试职位</label>
        <select id="position-select">
          <option value="frontend">前端开发</option>
          <option value="backend">后端开发</option>
          <option value="general" selected>通用面试</option>
        </select>
      </div>
      <div class="form-group">
        <label>你的名字</label>
        <input type="text" id="name-input" placeholder="输入你的名字..." value="Anonymous">
      </div>
      <button class="btn" onclick="startInterview()">开始面试 &#8594;</button>
    </div>

    <!-- Step 2: Interview -->
    <div id="step-interview" class="step">
      <div class="progress" id="progress-dots"></div>

      <div class="question-box">
        <div class="question-label">第 <span id="q-order">1</span> 题</div>
        <div class="question-text" id="question-text">加载中...</div>
      </div>

      <div class="recorder">
        <div class="record-btn" id="record-btn" onclick="toggleRecord()">
          <div class="record-icon"></div>
        </div>
        <div class="timer" id="timer">00:00</div>
        <div class="status-text" id="status-text">点击按钮开始录音</div>
      </div>

      <button class="btn btn-secondary" id="next-btn" onclick="submitAnswer()" disabled>
        提交录音 &amp; 下一题 &#8594;
      </button>
      <button class="btn btn-danger" onclick="endInterview()">结束面试</button>
    </div>

    <!-- Step 3: Done -->
    <div id="step-done" class="step">
      <div style="text-align:center;padding:20px;">
        <div style="font-size:3em;">&#127881;</div>
        <h2 style="margin:16px 0;">面试完成！</h2>
        <p style="color:rgba(255,255,255,0.6);margin-bottom:20px;">你的回答已全部保存到云端</p>
      </div>
      <div id="history-list"></div>
      <button class="btn" onclick="location.reload()">再来一次</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// State
let interviewId = ''
let currentQaId = ''
let totalQuestions = 0
let currentOrder = 0
let recorder = null
let audioChunks = []
let isRecording = false
let timerInterval = null
let seconds = 0

function toast(msg) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 2500)
}

function api(path, opts) {
  opts = opts || {}
  var headers = { 'Content-Type': 'application/json' }
  if (opts.headers) Object.assign(headers, opts.headers)
  return fetch(path, { headers: headers, method: opts.method, body: opts.body })
}

function showStep(id) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active') })
  document.getElementById(id).classList.add('active')
}

async function startInterview() {
  var position = document.getElementById('position-select').value
  var name = document.getElementById('name-input').value || 'Anonymous'

  var res = await api('/api/interviews', {
    method: 'POST',
    body: JSON.stringify({ position: position, candidateName: name }),
  })
  var data = await res.json()

  interviewId = data.interviewId
  totalQuestions = data.totalQuestions

  showStep('step-interview')
  renderProgress()
  await loadCurrentQuestion()
}

async function loadCurrentQuestion() {
  var res = await api('/api/interviews/' + interviewId + '/current')
  var data = await res.json()

  if (data.done) {
    await showHistory()
    showStep('step-done')
    return
  }

  currentQaId = data.qaId
  currentOrder = data.questionOrder
  document.getElementById('q-order').textContent = data.questionOrder
  document.getElementById('question-text').textContent = data.question

  renderProgress()
  resetRecorder()
  document.getElementById('next-btn').disabled = true
}

function renderProgress() {
  var el = document.getElementById('progress-dots')
  el.innerHTML = ''
  for (var i = 1; i <= totalQuestions; i++) {
    var dot = document.createElement('div')
    dot.className = 'dot'
    if (i < currentOrder) dot.classList.add('done')
    if (i === currentOrder) dot.classList.add('current')
    el.appendChild(dot)
  }
}

async function toggleRecord() {
  if (isRecording) {
    stopRecording()
  } else {
    await startRecording()
  }
}

async function startRecording() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true })
    recorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' })
    audioChunks = []

    recorder.ondataavailable = function(e) {
      if (e.data.size > 0) audioChunks.push(e.data)
    }

    recorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop() })
      document.getElementById('next-btn').disabled = false
    }

    recorder.start()
    isRecording = true
    document.getElementById('record-btn').classList.add('recording')
    document.getElementById('status-text').textContent = '正在录音...'
    seconds = 0
    updateTimer()
    timerInterval = setInterval(function() {
      seconds++
      updateTimer()
    }, 1000)
  } catch (e) {
    toast('请允许麦克风权限')
  }
}

function stopRecording() {
  if (recorder && recorder.state !== 'inactive') {
    recorder.stop()
  }
  isRecording = false
  document.getElementById('record-btn').classList.remove('recording')
  document.getElementById('status-text').textContent = '录音完成，可点击提交'
  clearInterval(timerInterval)
}

function resetRecorder() {
  if (recorder && recorder.state !== 'inactive') {
    recorder.stop()
  }
  isRecording = false
  document.getElementById('record-btn').classList.remove('recording')
  document.getElementById('status-text').textContent = '点击按钮开始录音'
  clearInterval(timerInterval)
  seconds = 0
  updateTimer()
  audioChunks = []
}

function updateTimer() {
  var m = String(Math.floor(seconds / 60)).padStart(2, '0')
  var s = String(seconds % 60).padStart(2, '0')
  document.getElementById('timer').textContent = m + ':' + s
}

async function submitAnswer() {
  if (!currentQaId || audioChunks.length === 0) {
    toast('请先录音')
    return
  }

  var audioBlob = new Blob(audioChunks, { type: 'audio/webm' })
  if (audioBlob.size < 100) {
    toast('录音太短，请重新录制')
    return
  }

  document.getElementById('next-btn').disabled = true
  document.getElementById('status-text').textContent = '上传中...'

  var formData = new FormData()
  formData.append('audio', audioBlob, 'answer.webm')
  formData.append('qaId', currentQaId)

  var res = await fetch('/api/interviews/' + interviewId + '/answer', {
    method: 'POST',
    body: formData,
  })
  var data = await res.json()

  if (data.success) {
    toast('录音已保存 ' + '\u2713'.toString())
    currentOrder++
    await loadCurrentQuestion()
  } else {
    toast('上传失败，请重试')
    document.getElementById('next-btn').disabled = false
  }
}

async function endInterview() {
  if (confirm('确定要结束面试吗？未提交的录音将丢失。')) {
    await showHistory()
    showStep('step-done')
  }
}

async function showHistory() {
  var res = await fetch('/api/interviews/' + interviewId + '/history')
  var data = await res.json()
  var el = document.getElementById('history-list')
  el.innerHTML = ''

  for (var i = 0; i < data.qas.length; i++) {
    var qa = data.qas[i]
    var div = document.createElement('div')
    div.className = 'history-item'

    var audioHtml = ''
    if (qa.answer_audio_key) {
      audioHtml = '<div class="history-audio"><audio controls><source src="/api/audio/' + qa.answer_audio_key + '" type="audio/webm"></audio></div>'
    }

    var transcriptHtml = ''
    if (qa.answer_text) {
      transcriptHtml = '<div class="history-a"><strong>转写:</strong> ' + qa.answer_text + '</div>'
    }

    div.innerHTML = '<div class="history-q"><strong>Q' + qa.question_order + ':</strong> ' + qa.question + '</div>' + transcriptHtml + audioHtml
    el.appendChild(div)
  }
}
</script>
</body>
</html>
