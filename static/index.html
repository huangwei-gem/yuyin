<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 语音面试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;}
.container{max-width:700px;width:100%;padding:24px;margin:20px;}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:20px;padding:32px;border:1px solid rgba(255,255,255,0.1);}
h1{text-align:center;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(90deg,#f7971e,#ffd200);color:#1a1a2e;margin:8px 0;font-size:16px;}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.btn-danger{background:linear-gradient(90deg,#e74c3c,#c0392b);color:#fff;}
.record-btn{width:80px;height:80px;border-radius:50%;border:3px solid #f7971e;background:rgba(247,151,30,0.1);cursor:pointer;margin:12px auto;display:flex;align-items:center;justify-content:center;}
.record-btn.recording{border-color:#e74c3c;animation:pulse 1.2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)}70%{box-shadow:0 0 0 20px rgba(231,76,60,0)}100%{box-shadow:0 0 0 0 rgba(231,76,60,0)}}
.step{display:none;}.step.active{display:block;}
.progress{display:flex;justify-content:center;gap:4px;margin:16px 0;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);}
.dot.done{background:#27ae60;}.dot.current{background:#f7971e;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);padding:12px 24px;border-radius:12px;z-index:999;display:none;}
.toast.show{display:block;}
select,input{width:100%;padding:12px;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);}
.question-box{background:rgba(255,255,255,0.05);padding:20px;margin:16px 0;border-left:4px solid #f7971e;}
</style>
</head>
<body>
<div class="container"><div class="card">
<h1>&#127908; AI 语音面试</h1>
<p style="color:rgba(255,255,255,0.5);margin-bottom:20px;">录音直存飞书多维表格</p>
<div id="s1" class="step active">
  <select id="pos"><option value="frontend">前端开发</option><option value="backend">后端开发</option><option value="general" selected>通用面试</option></select>
  <input type="text" id="name" value="Anonymous" placeholder="名字">
  <button class="btn" onclick="start()">开始面试</button>
</div>
<div id="s2" class="step">
  <div class="progress" id="dots"></div>
  <div class="question-box"><p id="qtext">加载中...</p></div>
  <div style="text-align:center;">
    <div class="record-btn" id="rbtn" onclick="rec()"><div style="width:32px;height:32px;background:#f7971e;border-radius:4px;" id="ricon"></div></div>
    <div style="font-size:1.2em;" id="timer">00:00</div>
    <div style="color:rgba(255,255,255,0.5);font-size:0.85em;" id="status">点击录音</div>
  </div>
  <button class="btn" id="next" onclick="submit()" disabled>提交录音</button>
  <button class="btn btn-danger" onclick="done()">结束面试</button>
</div>
<div id="s3" class="step" style="text-align:center;padding:20px;">
  <div style="font-size:3em;">&#127881;</div>
  <h2>面试完成！</h2>
  <p style="color:rgba(255,255,255,0.6);">录音已存入飞书</p>
  <a href="https://ywwlaii6ga7.feishu.cn/base/E9dCbLvXtawJtNsrhticbE1pnOd?table=tblRdpIVEQIh97Gs" target="_blank" style="color:#6b8cff;">查看飞书表格</a>
  <button class="btn" onclick="location.reload()">再来一次</button>
</div>
</div></div>
<div class="toast" id="toast"></div>
<script>
var AID="cli_aab083cfebf8dce7",ASEC="vkEtRGulqjNoyFnXuQSnjbzoKxqpcKl8",BT="E9dCbLvXtawJtNsrhticbE1pnOd",TI="tbl0G4d8VNOGS15z",TQ="tblRdpIVEQIh97Gs";
var QB={frontend:["请解释一下React的虚拟DOM是如何工作的？","你能说说CSS的盒模型是什么吗？","什么是闭包？请举一个实际应用的例子。","请解释一下Event Loop的机制。","前端性能优化有哪些常用的手段？"],backend:["请解释一下RESTful API的设计原则。","什么是数据库索引？它如何提高查询性能？","请解释一下什么是微服务架构。","如何设计一个高可用的系统？","什么是CAP定理？请简要说明。"],general:["请做个简单的自我介绍。","你为什么想来我们公司？","请分享一个你解决过的技术难题。","你是如何处理工作中的压力的？","你未来三年的职业规划是什么？"]};
var st=0,qs=[],iid="",rec=null,chunks=[],isRec=false,ti=null,sec=0;
function $(i){return document.getElementById(i)}
function tm(m){var e=$("toast");e.textContent=m;e.classList.add("show");setTimeout(function(){e.classList.remove("show")},2000)}
function sw(id){document.querySelectorAll(".step").forEach(function(s){s.classList.remove("active")});$(id).classList.add("active")}
function gid(){return"xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c==="x"?r:(r&0x3)|0x8).toString(16)})}
var _tk={t:"",e:0};
async function gtk(){if(Date.now()<_tk.e)return _tk.t;var r=await fetch("/api/proxy?url=https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({app_id:AID,app_secret:ASEC})});var d=await r.json();if(d.code!==0)throw Error(d.msg);_tk.t=d.tenant_access_token;_tk.e=Date.now()+(d.expire-60)*1000;return d.tenant_access_token}
async function upload(t,fn,b){var f=new FormData();f.append("file_name",fn);f.append("parent_type","bitable_file");f.append("parent_node",BT);f.append("size",b.size);f.append("file",b,fn);var r=await fetch("/api/proxy?url=https://open.feishu.cn/open-apis/drive/v1/medias/upload_all",{method:"POST",headers:{Authorization:"Bearer "+t},body:f});var d=await r.json();if(d.code!==0)throw Error(d.msg);return d.data.file_token}
async function addRec(t,ti,fd){var r=await fetch("/api/proxy?url=https://open.feishu.cn/open-apis/bitable/v1/apps/"+BT+"/tables/"+ti+"/records",{method:"POST",headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},body:JSON.stringify({fields:fd})});var d=await r.json();if(d.code!==0)throw Error(d.msg);return d.data.record.record_id}
async function start(){var p=$("pos").value,n=$("name").value||"Anonymous";qs=QB[p]||QB.general;iid=gid();st=0;try{var t=await gtk();await addRec(t,TI,{"面试ID":iid,"候选人":n,"职位":p==="frontend"?"前端开发":p==="backend"?"后端开发":"通用面试","总题数":qs.length,"状态":"进行中","创建时间":new Date().toLocaleString("zh-CN",{timeZone:"Asia/Shanghai"})})}catch(e){console.error(e)}sw("s2");showQ()}
function showQ(){if(st>=qs.length){sw("s3");return}$("qtext").textContent=qs[st];rp();rst();$("next").disabled=true}
function rp(){var e=$("dots");e.innerHTML="";for(var i=0;i<qs.length;i++){var d=document.createElement("div");d.className="dot";if(i<st)d.classList.add("done");if(i===st)d.classList.add("current");e.appendChild(d)}}
async function rec(){if(isRec){stopRec()}else{await startRec()}}
async function startRec(){try{var s=await navigator.mediaDevices.getUserMedia({audio:true});rec=new MediaRecorder(s,{mimeType:"audio/webm;codecs=opus"});chunks=[];rec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data)};rec.onstop=function(){s.getTracks().forEach(function(t){t.stop()});$("next").disabled=false};rec.start();isRec=true;$("rbtn").classList.add("recording");$("status").textContent="正在录音...";sec=0;updT();ti=setInterval(function(){sec++;updT()},1000)}catch(e){tm("请允许麦克风权限")}}
function stopRec(){if(rec&&rec.state!=="inactive")rec.stop();isRec=false;$("rbtn").classList.remove("recording");$("status").textContent="正在上传...";clearInterval(ti)}
function rst(){if(rec&&rec.state!=="inactive")rec.stop();isRec=false;$("rbtn").classList.remove("recording");$("status").textContent="点击录音";clearInterval(ti);sec=0;updT();chunks=[]}
function updT(){var m=String(Math.floor(sec/60)).padStart(2,"0");var s=String(sec%60).padStart(2,"0");$("timer").textContent=m+":"+s}
async function submit(){if(chunks.length===0){tm("请先录音");return}var b=new Blob(chunks,{type:"audio/webm"});if(b.size<100){tm("录音太短");return}$("next").disabled=true;$("status").textContent="上传飞书...";try{var t=await gtk();var fn="interview-"+iid+"-q"+(st+1)+".webm";var ft=await upload(t,fn,b);await addRec(t,TQ,{"面试ID":iid,"题目":qs[st],"题号":String(st+1),"录音":ft});tm("已保存到飞书!");st++;showQ()}catch(e){tm("上传失败");$("next").disabled=false}}
function done(){if(confirm("确定结束？"))sw("s3")}
</script>
</body>
</html>
