<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 语音面试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;}
.container{max-width:700px;width:100%;padding:24px;margin:20px;}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:20px;padding:32px;border:1px solid rgba(255,255,255,0.1);}
h1{text-align:center;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(90deg,#f7971e,#ffd200);color:#1a1a2e;margin:8px 0;font-size:16px;font-weight:600;}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-danger{background:linear-gradient(90deg,#e74c3c,#c0392b);color:#fff;}
.record-btn{width:80px;height:80px;border-radius:50%;border:3px solid #f7971e;background:rgba(247,151,30,0.1);cursor:pointer;margin:12px auto;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.record-btn:hover{border-color:#ffd200;background:rgba(247,151,30,0.2);}
.record-btn.recording{border-color:#e74c3c;animation:pulse 1.2s infinite;}
.record-btn.recording #ricon{background:#e74c3c;border-radius:50%;width:24px;height:24px;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)}70%{box-shadow:0 0 0 20px rgba(231,76,60,0)}100%{box-shadow:0 0 0 0 rgba(231,76,60,0)}}
.step{display:none;}.step.active{display:block;}
.progress{display:flex;justify-content:center;gap:4px;margin:16px 0;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);}
.dot.done{background:#27ae60;}.dot.current{background:#f7971e;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;padding:12px 24px;border-radius:12px;z-index:999;display:none;}
.toast.show{display:block;}
select,input{width:100%;padding:12px;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);margin:6px 0;font-size:15px;}
select option{background:#302b63;color:#fff;}
.qbox{background:rgba(255,255,255,0.05);padding:20px;margin:16px 0;border-left:4px solid #f7971e;font-size:17px;line-height:1.7;}
#timer{font-size:2em;font-weight:700;margin:8px 0;}
.st{color:rgba(255,255,255,0.5);font-size:.85em;}
</style>
</head>
<body>
<div class="container"><div class="card">
<h1>&#127908; AI 语音面试</h1>
<p style="color:#888;margin-bottom:20px;">录音存飞书</p>
<div id="s1" class="step active">
  <select id="pos"><option value="frontend">前端开发</option><option value="backend">后端开发</option><option value="general" selected>通用面试</option></select>
  <input type="text" id="name" value="Anonymous" placeholder="姓名">
  <button class="btn" onclick="start()">开始面试</button>
</div>
<div id="s2" class="step">
  <div class="progress" id="dots"></div>
  <div class="qbox"><p id="qtext">加载中...</p></div>
  <div style="text-align:center;">
    <div class="record-btn" id="rbtn" onclick="rec()"><div id="ricon" style="width:32px;height:32px;background:#f7971e;border-radius:4px;"></div></div>
    <div id="timer">00:00</div>
    <div class="st" id="status">点击录音</div>
  </div>
  <button class="btn" id="nb" onclick="sub()" disabled>提交录音</button>
  <button class="btn btn-danger" onclick="end()">结束</button>
</div>
<div id="s3" class="step" style="text-align:center;padding:20px;">
  <div style="font-size:3em;">&#127881;</div>
  <h2>完成！</h2>
  <p style="color:#888;">录音已存飞书</p>
  <a href="https://ywwlaii6ga7.feishu.cn/base/E9dCbLvXtawJtNsrhticbE1pnOd?table=tblRdpIVEQIh97Gs" target="_blank" style="color:#6b8cff;">查看表格</a><br><br>
  <button class="btn" onclick="location.reload()">再来</button>
</div>
</div></div>
<div class="toast" id="toast"></div>
<script>
// === Feishu credentials (embedded in frontend - OK to expose) ===
var AID = "cli_aab083cfebf8dce7";
var ASEC = "vkEtRGulqjNoyFnXuQSnjbzoKxqpcKl8";
var BT = "E9dCbLvXtawJtNsrhticbE1pnOd";
var TI = "tbl0G4d8VNOGS15z";
var TQ = "tblRdpIVEQIh97Gs";

var QUESTIONS = {
  frontend: ["请解释React虚拟DOM如何工作？","CSS盒模型是什么？","什么是闭包？举例。","Event Loop机制？","前端性能优化手段？"],
  backend: ["RESTful API设计原则？","数据库索引如何提高性能？","微服务架构是什么？","如何设计高可用系统？","CAP定理是什么？"],
  general: ["自我介绍。","为什么来我们公司？","分享解决过的技术难题。","如何处理工作压力？","未来三年职业规划？"]
};

var st=0,qs=[],iid="",rec=null,chunks=[],isRec=false,ti=null,sec=0;
function $(i){return document.getElementById(i)}
function tm(m){var e=$("toast");e.textContent=m;e.classList.add("show");setTimeout(function(){e.classList.remove("show")},2500)}
function sw(id){var ss=document.querySelectorAll(".step");for(var i=0;i<ss.length;i++)ss[i].classList.remove("active");$(id).classList.add("active")}
function start(){
  qs=QUESTIONS[$("pos").value]||QUESTIONS.general;
  iid=crypto.randomUUID();st=0;sw("s2");showQ();
}
function showQ(){
  if(st>=qs.length){sw("s3");return}
  $("qtext").textContent=qs[st];renderDots();rst();
}
function renderDots(){
  var e=$("dots");e.innerHTML="";
  for(var i=0;i<qs.length;i++){var d=document.createElement("div");d.className="dot";if(i<st)d.classList.add("done");if(i===st)d.classList.add("current");e.appendChild(d)}
}
function rec(){if(isRec){stp()}else{gorec()}}
function gorec(){
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(s){
    chunks=[];rec=new MediaRecorder(s,{mimeType:"audio/webm;codecs=opus"});
    rec.ondataavailable=function(e){if(e.data.size>0)chunks.push(e.data)};
    rec.onstop=function(){s.getTracks().forEach(function(t){t.stop()});$("nb").disabled=false};
    rec.start(250);isRec=true;$("rbtn").classList.add("recording");$("status").textContent="录音中...";
    sec=0;updT();ti=setInterval(function(){sec++;updT()},1000);
  }).catch(function(){tm("请允许麦克风")});
}
function stp(){
  if(rec&&rec.state!=="inactive")rec.stop();
  isRec=false;$("rbtn").classList.remove("recording");clearInterval(ti);$("status").textContent="已停止";
}
function rst(){
  if(rec&&rec.state!=="inactive")rec.stop();
  isRec=false;$("rbtn").classList.remove("recording");clearInterval(ti);sec=0;updT();chunks=[];$("status").textContent="点击录音";$("nb").disabled=true;
}
function updT(){var m=String(Math.floor(sec/60)).padStart(2,"0");var s=String(sec%60).padStart(2,"0");$("timer").textContent=m+":"+s}
function sub(){
  if(chunks.length===0){tm("请先录音");return}
  var blob=new Blob(chunks,{type:"audio/webm"});
  if(blob.size<200){tm("录音太短");return}
  $("nb").disabled=true;$("status").textContent="上传中...";
  var fd=new FormData();
  fd.append("audio",blob,"q"+(st+1)+".webm");
  fd.append("question",qs[st]);
  fd.append("interviewId",iid);
  fd.append("questionOrder",String(st+1));
  fd.append("totalQuestions",String(qs.length));
  fd.append("candidateName",$("name").value||"Anonymous");
  fd.append("position",$("pos").value);
  fd.append("appId",AID);
  fd.append("appSecret",ASEC);
  fd.append("baseToken",BT);
  fd.append("tableId",TI);
  fd.append("qaTableId",TQ);
  fetch("/api/proxy",{method:"POST",body:fd}).then(function(r){return r.json()}).then(function(d){
    if(d.success){tm("已保存!");st++;showQ()}
    else{tm("失败: "+d.error);$("nb").disabled=false;$("status").textContent="重试"}
  }).catch(function(){tm("网络错误");$("nb").disabled=false;$("status").textContent="重试"});
}
function end(){if(confirm("确定结束？")){if(isRec)stp();sw("s3")}}
</script>
</body>
</html>
