<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 语音面试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;}
.container{max-width:700px;width:100%;padding:24px;margin:20px;}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:20px;padding:32px;border:1px solid rgba(255,255,255,0.1);}
h1{text-align:center;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(90deg,#f7971e,#ffd200);color:#1a1a2e;margin:8px 0;font-size:16px;font-weight:600;}
.btn:hover{transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-danger{background:linear-gradient(90deg,#e74c3c,#c0392b);color:#fff;}
.record-btn{width:80px;height:80px;border-radius:50%;border:3px solid #f7971e;background:rgba(247,151,30,0.1);cursor:pointer;margin:12px auto;display:flex;align-items:center;justify-content:center;transition:all 0.3s;}
.record-btn:hover{border-color:#ffd200;background:rgba(247,151,30,0.2);}
.record-btn.recording{border-color:#e74c3c;animation:pulse 1.2s infinite;}
.record-btn.recording #ricon{background:#e74c3c;border-radius:50%;width:24px;height:24px;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(231,76,60,0.4)}70%{box-shadow:0 0 0 20px rgba(231,76,60,0)}100%{box-shadow:0 0 0 0 rgba(231,76,60,0)}}
.step{display:none;}.step.active{display:block;}
.progress{display:flex;justify-content:center;gap:4px;margin:16px 0;}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.15);}
.dot.done{background:#27ae60;}.dot.current{background:#f7971e;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);padding:12px 24px;border-radius:12px;z-index:999;display:none;backdrop-filter:blur(8px);}
.toast.show{display:block;}
select,input{width:100%;padding:12px;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);margin:6px 0;font-size:15px;}
select option{background:#302b63;color:#fff;}
.question-box{background:rgba(255,255,255,0.05);padding:20px;margin:16px 0;border-left:4px solid #f7971e;border-radius:0 12px 12px 0;font-size:17px;line-height:1.7;}
.recording-status{text-align:center;padding:10px;}
#timer{font-size:2em;font-weight:700;margin:8px 0;font-variant-numeric:tabular-nums;}
.status-text{color:rgba(255,255,255,0.5);font-size:0.85em;}
.loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#f7971e;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="container"><div class="card">
<h1>&#127908; AI 语音面试</h1>
<p style="color:rgba(255,255,255,0.5);margin-bottom:20px;">录音直存飞书多维表格</p>
<div id="s1" class="step active">
  <label style="color:rgba(255,255,255,0.6);font-size:0.9em;">职位类型</label>
  <select id="pos"><option value="frontend">前端开发</option><option value="backend">后端开发</option><option value="general" selected>通用面试</option></select>
  <label style="color:rgba(255,255,255,0.6);font-size:0.9em;">姓名</label>
  <input type="text" id="name" value="Anonymous" placeholder="输入姓名">
  <button class="btn" onclick="start()">开始面试</button>
</div>
<div id="s2" class="step">
  <div class="progress" id="dots"></div>
  <div class="question-box"><p id="qtext">加载中...</p></div>
  <div class="recording-status">
    <div class="record-btn" id="rbtn" onclick="toggleRec()"><div id="ricon" style="width:32px;height:32px;background:#f7971e;border-radius:4px;"></div></div>
    <div id="timer">00:00</div>
    <div class="status-text" id="status">点击录音</div>
  </div>
  <button class="btn" id="nextBtn" onclick="submitAnswer()" disabled>提交录音</button>
  <button class="btn btn-danger" onclick="endInterview()">结束面试</button>
</div>
<div id="s3" class="step" style="text-align:center;padding:20px;">
  <div style="font-size:3em;">&#127881;</div>
  <h2>面试完成！</h2>
  <p style="color:rgba(255,255,255,0.6);margin:12px 0;">录音已存入飞书</p>
  <a href="https://ywwlaii6ga7.feishu.cn/base/E9dCbLvXtawJtNsrhticbE1pnOd?table=tblRdpIVEQIh97Gs" target="_blank" style="color:#6b8cff;text-decoration:none;">查看飞书表格 &#8599;</a>
  <br><br>
  <button class="btn" onclick="location.reload()">再来一次</button>
</div>
</div></div>
<div class="toast" id="toast"></div>
<script>
// === Feishu Config ===
const FEISHU_APP_ID = "cli_aab083cfebf8dce7";
const FEISHU_APP_SECRET = "vkEtRGulqjNoyFnXuQSnjbzoKxqpcKl8";
const BASE_TOKEN = "E9dCbLvXtawJtNsrhticbE1pnOd";
const INTERVIEW_TABLE = "tbl0G4d8VNOGS15z";
const QA_TABLE = "tblRdpIVEQIh97Gs";

// === Questions Bank ===
const QUESTIONS = {
  frontend: [
    "请解释一下React的虚拟DOM是如何工作的？",
    "你能说说CSS的盒模型是什么吗？",
    "什么是闭包？请举一个实际应用的例子。",
    "请解释一下Event Loop的机制。",
    "前端性能优化有哪些常用的手段？"
  ],
  backend: [
    "请解释一下RESTful API的设计原则。",
    "什么是数据库索引？它如何提高查询性能？",
    "请解释一下什么是微服务架构。",
    "如何设计一个高可用的系统？",
    "什么是CAP定理？请简要说明。"
  ],
  general: [
    "请做一个简单的自我介绍。",
    "你为什么想来我们公司？",
    "请分享一个你解决过的技术难题。",
    "你是如何处理工作中的压力的？",
    "你未来三年的职业规划是什么？"
  ]
};

// === State ===
let currentStep = 0;
let questions = [];
let interviewId = "";
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let timerInterval = null;
let seconds = 0;
let tokenCache = { token: "", expires: 0 };

// === Helpers ===
function $(id) { return document.getElementById(id); }

function showToast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

function switchStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

function generateId() {
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === "x" ? r : (r & 0x3) | 0x8).toString(16);
  });
}

// === Feishu API via Proxy ===
const API_PROXY = "/api/proxy?url=";

async function feishuRequest(path, options = {}) {
  const url = API_PROXY + encodeURIComponent("https://open.feishu.cn/open-apis" + path);
  const resp = await fetch(url, options);
  const text = await resp.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error("Parse error: " + text.slice(0, 200));
  }
}

async function getTenantToken() {
  if (Date.now() < tokenCache.expires) return tokenCache.token;
  const data = await feishuRequest("/auth/v3/tenant_access_token/internal", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ app_id: FEISHU_APP_ID, app_secret: FEISHU_APP_SECRET })
  });
  if (data.code !== 0) throw new Error("Token error: " + JSON.stringify(data));
  tokenCache.token = data.tenant_access_token;
  tokenCache.expires = Date.now() + (data.expire - 60) * 1000;
  return data.tenant_access_token;
}

async function addRecord(tableId, fields) {
  const token = await getTenantToken();
  const data = await feishuRequest("/bitable/v1/apps/" + BASE_TOKEN + "/tables/" + tableId + "/records", {
    method: "POST",
    headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ fields })
  });
  if (data.code !== 0) throw new Error("Add record error: " + JSON.stringify(data));
  return data.data.record.record_id;
}

async function uploadAudio(token, fileName, blob) {
  // Step 1: Create the upload task
  const size = blob.size;
  const createResp = await feishuRequest("/drive/v1/medias/upload_all", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    },
    body: (() => {
      const fd = new FormData();
      fd.append("file_name", fileName);
      fd.append("parent_type", "bitable_file");
      fd.append("parent_node", BASE_TOKEN);
      fd.append("size", String(size));
      fd.append("file", blob, fileName);
      return fd;
    })()
  });
  
  if (createResp.code !== 0) throw new Error("Upload error: " + JSON.stringify(createResp));
  return createResp.data.file_token;
}

// === Interview Logic ===
async function start() {
  const pos = $("pos").value;
  const name = $("name").value || "Anonymous";
  questions = QUESTIONS[pos] || QUESTIONS.general;
  interviewId = generateId();
  currentStep = 0;

  try {
    await addRecord(INTERVIEW_TABLE, {
      "面试ID": interviewId,
      "候选人": name,
      "职位": pos === "frontend" ? "前端开发" : pos === "backend" ? "后端开发" : "通用面试",
      "总题数": questions.length,
      "状态": "进行中",
      "创建时间": new Date().toLocaleString("zh-CN", { timeZone: "Asia/Shanghai" })
    });
  } catch (e) {
    console.error("Failed to create interview record:", e);
    showToast("创建面试记录失败，但可以继续面试");
  }

  switchStep("s2");
  showQuestion();
}

function showQuestion() {
  if (currentStep >= questions.length) {
    switchStep("s3");
    return;
  }
  $("qtext").textContent = questions[currentStep];
  renderProgress();
  resetRecorder();
  $("nextBtn").disabled = true;
}

function renderProgress() {
  const container = $("dots");
  container.innerHTML = "";
  for (let i = 0; i < questions.length; i++) {
    const dot = document.createElement("div");
    dot.className = "dot";
    if (i < currentStep) dot.classList.add("done");
    if (i === currentStep) dot.classList.add("current");
    container.appendChild(dot);
  }
}

// === Recording ===
async function toggleRec() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    
    // Try mp4/m4a first, then webm as fallback
    let mimeType = 'audio/webm;codecs=opus';
    if (MediaRecorder.isTypeSupported('audio/mp4')) {
      mimeType = 'audio/mp4';
    } else if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
      mimeType = 'audio/webm;codecs=opus';
    }
    
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      $("nextBtn").disabled = false;
    };

    mediaRecorder.start(250); // collect data every 250ms
    isRecording = true;
    $("rbtn").classList.add("recording");
    $("status").textContent = "正在录音...";
    
    seconds = 0;
    updateTimer();
    timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);
    
  } catch (e) {
    showToast("请允许麦克风权限");
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }
  isRecording = false;
  $("rbtn").classList.remove("recording");
  $("status").textContent = "已停止录音";
  clearInterval(timerInterval);
}

function resetRecorder() {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    mediaRecorder.stop();
  }
  isRecording = false;
  $("rbtn").classList.remove("recording");
  $("status").textContent = "点击录音";
  clearInterval(timerInterval);
  seconds = 0;
  updateTimer();
  audioChunks = [];
}

function updateTimer() {
  const m = String(Math.floor(seconds / 60)).padStart(2, "0");
  const s = String(seconds % 60).padStart(2, "0");
  $("timer").textContent = m + ":" + s;
}

// === Submit Answer ===
async function submitAnswer() {
  if (audioChunks.length === 0) {
    showToast("请先录音");
    return;
  }

  // Determine mime type
  const mimeType = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : "audio/webm";
  const ext = mimeType.includes("mp4") ? "m4a" : "webm";
  const blob = new Blob(audioChunks, { type: mimeType });

  if (blob.size < 200) {
    showToast("录音太短");
    return;
  }

  $("nextBtn").disabled = true;
  $("status").innerHTML = '<span class="loading"></span>上传飞书...';

  try {
    const token = await getTenantToken();
    const fileName = "interview-" + interviewId + "-q" + (currentStep + 1) + "." + ext;
    
    // Upload audio file
    const fileToken = await uploadAudio(token, fileName, blob);
    
    // Write record to QA table with file token
    await addRecord(QA_TABLE, {
      "面试ID": interviewId,
      "题目": questions[currentStep],
      "题号": String(currentStep + 1),
      "录音": fileToken
    });

    showToast("已保存到飞书!");
    currentStep++;
    showQuestion();
    
  } catch (e) {
    console.error("Submit error:", e);
    showToast("上传失败: " + e.message);
    $("nextBtn").disabled = false;
    $("status").textContent = "上传失败，重试";
  }
}

function endInterview() {
  if (confirm("确定结束面试？")) {
    if (isRecording) stopRecording();
    switchStep("s3");
  }
}
</script>
</body>
</html>
