name = ""ai-interview-demo""
main = ""src/index.ts""
compatibility_date = ""2024-12-01""
compatibility_flags = [""nodejs_compat""]

# AI Binding (Workers AI)
ai = { binding = ""AI"", type = ""ai"" }

# R2 Bucket (音频存储)
[[r2_buckets]]
binding = ""AUDIO_BUCKET""
bucket_name = ""ai-interview-audio""

# D1 Database (面试记录)
[[d1_databases]]
binding = ""DB""
database_name = ""ai-interview-db""
database_id = ""your-d1-database-id""

# 静态资源
[site]
bucket = ""./static""
